name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.name }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-x86_64
            os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            archive: tar.gz
          - name: windows-x86_64
            os: windows-latest
            target: x86_64-pc-windows-msvc
            archive: zip

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package (linux)
        if: matrix.archive == 'tar.gz'
        run: |
          staging="rustfm-${GITHUB_REF_NAME}-${{ matrix.name }}"
          mkdir "$staging"
          cp "target/${{ matrix.target }}/release/rustfm" "$staging/"
          cp README.md LICENSE* "$staging/" 2>/dev/null || cp README.md "$staging/"
          tar czf "$staging.tar.gz" "$staging"
          echo "ASSET=$staging.tar.gz" >> "$GITHUB_ENV"

      - name: Package (windows)
        if: matrix.archive == 'zip'
        shell: pwsh
        run: |
          $staging = "rustfm-$env:GITHUB_REF_NAME-${{ matrix.name }}"
          New-Item -ItemType Directory -Path $staging | Out-Null
          Copy-Item "target/${{ matrix.target }}/release/rustfm.exe" $staging/
          Copy-Item README.md $staging/
          Compress-Archive -Path $staging -DestinationPath "$staging.zip"
          echo "ASSET=$staging.zip" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.ASSET }}
          generate_release_notes: true
